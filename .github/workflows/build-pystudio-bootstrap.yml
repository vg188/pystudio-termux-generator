name: Build PyStudio Bootstrap

on:
  workflow_dispatch:
    inputs:
      architectures:
        description: "Bootstrap architectures, comma-separated."
        required: false
        default: "aarch64,arm,i686,x86_64"
      additional_packages:
        description: "Extra packages to include in the bootstrap, comma-separated."
        required: false
        default: ""
      publish_release:
        description: "Publish artifacts to a GitHub release."
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: pystudio-bootstrap-${{ github.ref }}
  cancel-in-progress: true

env:
  PYSTUDIO_PACKAGE_NAME: com.vchangxiao.pystudio
  DEFAULT_ARCHITECTURES: aarch64,arm,i686,x86_64

jobs:
  resolve-inputs:
    name: Resolve matrix
    runs-on: ubuntu-24.04
    outputs:
      architectures_json: ${{ steps.inputs.outputs.architectures_json }}
      additional_packages: ${{ steps.inputs.outputs.additional_packages }}
      publish_release: ${{ steps.inputs.outputs.publish_release }}
    steps:
      - name: Resolve inputs
        id: inputs
        shell: bash
        env:
          INPUT_ARCHITECTURES: ${{ github.event.inputs.architectures }}
          INPUT_ADDITIONAL_PACKAGES: ${{ github.event.inputs.additional_packages }}
          INPUT_PUBLISH_RELEASE: ${{ github.event.inputs.publish_release }}
        run: |
          set -euo pipefail

          architectures="${INPUT_ARCHITECTURES:-$DEFAULT_ARCHITECTURES}"
          additional_packages="${INPUT_ADDITIONAL_PACKAGES:-}"
          publish_release="${INPUT_PUBLISH_RELEASE:-true}"

          arch_list="$(tr ',' ' ' <<< "$architectures")"
          for arch in $arch_list; do
            case "$arch" in
              aarch64|arm|i686|x86_64) ;;
              *) echo "Unsupported architecture: $arch"; exit 1 ;;
            esac
          done

          architectures_json="$(for arch in $arch_list; do printf '%s\n' "$arch"; done | jq -R . | jq -s -c .)"

          {
            echo "architectures_json=$architectures_json"
            echo "additional_packages=$additional_packages"
            echo "publish_release=$publish_release"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build PyStudio bootstrap / ${{ matrix.target_arch }}
    needs: resolve-inputs
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        target_arch: ${{ fromJson(needs.resolve-inputs.outputs.architectures_json) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build bootstrap only
        shell: bash
        env:
          ADDITIONAL_PACKAGES: ${{ needs.resolve-inputs.outputs.additional_packages }}
        run: |
          set -euo pipefail

          args=(
            --name "$PYSTUDIO_PACKAGE_NAME"
            --type f-droid
            --architectures "${{ matrix.target_arch }}"
            --disable-terminal
            --disable-tasker
            --disable-float
            --disable-widget
            --disable-api
            --disable-boot
            --disable-styling
            --disable-gui
            --disable-x11
          )

          if [[ -n "$ADDITIONAL_PACKAGES" ]]; then
            args+=(--add "$ADDITIONAL_PACKAGES")
          fi

          ./build-termux.sh "${args[@]}"

      - name: Collect bootstrap assets
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p artifacts

          bootstrap_count=0
          for bootstrap in *bootstrap-*.tar.xz termux-packages-main/bootstrap-*.tar.xz; do
            [[ -f "$bootstrap" ]] || continue
            filename="$(basename "$bootstrap")"
            arch="$(sed -E 's/.*bootstrap-([^.]*)\.tar\.xz$/\1/' <<< "$filename")"
            cp -f "$bootstrap" "artifacts/bootstrap-${arch}.tar.xz"
            cp -f "$bootstrap" "artifacts/${PYSTUDIO_PACKAGE_NAME}-f-droid-bootstrap-${arch}.tar.xz"
            bootstrap_count=$((bootstrap_count + 1))
          done

          for xz_dir in termux-packages-main/xz-* xz-*; do
            [[ -d "$xz_dir" ]] || continue
            cp -a "$xz_dir" artifacts/
          done

          if [[ "$bootstrap_count" -eq 0 ]]; then
            echo "No bootstrap tarballs were produced."
            exit 1
          fi

          tar -czf "pystudio-bootstrap-assets-${{ matrix.target_arch }}.tar.gz" -C artifacts .
          mv "pystudio-bootstrap-assets-${{ matrix.target_arch }}.tar.gz" artifacts/

          (
            cd artifacts
            find . -type f ! -name SHA256SUMS.txt -print0 |
              sort -z |
              xargs -0 sha256sum > SHA256SUMS.txt
          )

          find artifacts -maxdepth 3 -type f -print

      - name: Upload bootstrap artifact
        uses: actions/upload-artifact@v4
        with:
          name: pystudio-bootstrap-${{ matrix.target_arch }}-${{ github.run_number }}
          path: artifacts/**
          if-no-files-found: error

  release:
    name: Publish release
    needs:
      - resolve-inputs
      - build
    if: ${{ needs.resolve-inputs.outputs.publish_release == 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Download bootstrap artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List release files
        shell: bash
        run: |
          set -euo pipefail
          find artifacts -type f -print | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pystudio-bootstrap-r${{ github.run_number }}
          name: PyStudio bootstrap r${{ github.run_number }}
          files: |
            artifacts/**/bootstrap-*.tar.xz
            artifacts/**/com.vchangxiao.pystudio-f-droid-bootstrap-*.tar.xz
            artifacts/**/pystudio-bootstrap-assets-*.tar.gz
            artifacts/**/SHA256SUMS.txt
